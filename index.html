<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badminton Score</title>
  <style>
    

    :root {
      --bg: #0a0c10;
      --surface: #12161e;
      --border: #1e2533;
      --neon: #c8f73a;
      --neon-dim: rgba(200, 247, 58, 0.15);
      --neon-glow: rgba(200, 247, 58, 0.4);
      --text: #e8edf5;
      --muted: #5a6478;
      --red: #ff4f64;
      --red-dim: rgba(255, 79, 100, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,247,58,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,247,58,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow top */
    body::after {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse at center, rgba(200,247,58,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .header .shuttle {
      font-size: 22px;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .header h1 {
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: 32px;
      letter-spacing: 3px;
      color: var(--neon);
      text-shadow: 0 0 20px var(--neon-glow);
    }

    /* Set indicator */
    .set-indicator {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* Score board */
    .scoreboard {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 20px 24px;
      position: relative;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .scoreboard::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
    }

    .players-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .player-label {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      flex: 1;
      text-align: center;
    }

    .vs-badge {
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--border);
      padding: 0 12px;
    }

    .scores-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0;
      margin-bottom: 20px;
    }

    .score-block {
      flex: 1;
      text-align: center;
      position: relative;
    }

    .score-number {
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: 96px;
      line-height: 1;
      color: var(--text);
      transition: all 0.2s;
      display: block;
    }

    .score-block.leading .score-number {
      color: var(--neon);
      text-shadow: 0 0 30px var(--neon-glow), 0 0 60px rgba(200,247,58,0.2);
    }

    .score-block.just-scored .score-number {
      animation: scoreFlash 0.4s ease-out;
    }

    @keyframes scoreFlash {
      0% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .divider {
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: 60px;
      color: var(--border);
      line-height: 1;
      padding: 0 8px;
      align-self: center;
      padding-bottom: 8px;
    }

    /* Server info */
    .server-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .server-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 8px var(--neon-glow);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    .server-text {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .server-text span {
      color: var(--neon);
      font-weight: 500;
    }

    /* Court diagram */
    .court-wrap {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      position: relative;
    }

    .court-label {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 12px;
    }

    .court {
      width: 100%;
      height: 80px;
      border: 2px solid #2a3346;
      border-radius: 6px;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    .court-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: #2a3346;
      transition: all 0.3s ease;
      position: relative;
    }

    .court-side:first-child {
      border-right: 2px solid #2a3346;
    }

    .court-side.active {
      background: var(--neon-dim);
      color: var(--neon);
    }

    .court-side.active::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(200,247,58,0.08), transparent 70%);
    }

    /* Shuttle icon on court */
    .court-shuttle {
      position: absolute;
      font-size: 18px;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 2;
    }

    /* Winner banner */
    .winner-banner {
      width: 100%;
      background: linear-gradient(135deg, rgba(200,247,58,0.1), rgba(200,247,58,0.05));
      border: 1px solid rgba(200,247,58,0.3);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      display: none;
      margin-bottom: 16px;
      animation: bannerIn 0.4s ease-out;
    }

    @keyframes bannerIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .winner-banner.visible {
      display: block;
    }

    .winner-title {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .winner-name {
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: 36px;
      letter-spacing: 4px;
      color: var(--neon);
      text-shadow: 0 0 20px var(--neon-glow);
    }

    /* Buttons */
    .buttons-row {
      display: flex;
      gap: 10px;
      width: 100%;
      margin-bottom: 10px;
    }

    .btn-point {
      flex: 1;
      padding: 18px 12px;
      border: none;
      border-radius: 14px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 1.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .btn-point::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.1s;
    }

    .btn-point:active::after {
      opacity: 0.1;
    }

    .btn-a {
      background: var(--neon);
      color: #0a0c10;
    }

    .btn-a:hover:not(:disabled) {
      box-shadow: 0 0 20px var(--neon-glow), 0 4px 20px rgba(200,247,58,0.3);
      transform: translateY(-2px);
    }

    .btn-b {
      background: transparent;
      color: var(--neon);
      border: 1.5px solid var(--neon);
    }

    .btn-b:hover:not(:disabled) {
      background: var(--neon-dim);
      transform: translateY(-2px);
    }

    .btn-point:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-undo {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-undo:hover:not(:disabled) {
      border-color: var(--muted);
      color: var(--text);
    }

    .btn-undo:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    /* Rally history dots */
    .history-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 12px 16px;
      min-height: 40px;
    }

    .rally-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: dotIn 0.2s ease-out;
    }

    @keyframes dotIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .rally-dot.a { background: var(--neon); box-shadow: 0 0 4px var(--neon-glow); }
    .rally-dot.b { background: var(--red); box-shadow: 0 0 4px rgba(255,79,100,0.4); }

    .history-legend {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .legend-dot.a { background: var(--neon); }
    .legend-dot.b { background: var(--red); }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="shuttle">🏸</span>
    <h1>Badminton</h1>
  </div>

  <div class="set-indicator">Live Score Tracker</div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="players-row">
      <div class="player-label">Player A</div>
      <div class="vs-badge">VS</div>
      <div class="player-label">Player B</div>
    </div>
    <div class="scores-row">
      <div class="score-block" id="blockA">
        <span class="score-number" id="scoreA">0</span>
      </div>
      <div class="divider">—</div>
      <div class="score-block" id="blockB">
        <span class="score-number" id="scoreB">0</span>
      </div>
    </div>
    <div class="server-row">
      <div class="server-dot"></div>
      <div class="server-text" id="serverInfo">Server: <span>Player A (Right)</span></div>
    </div>
  </div>

  <!-- Court -->
  <div class="court-wrap">
    <div class="court-label">Service Court</div>
    <div class="court" id="court">
      <div class="court-side" id="leftSide">L</div>
      <div class="court-side" id="rightSide">R</div>
      <span class="court-shuttle" id="courtShuttle" style="top: 50%; transform: translateY(-50%);">🏸</span>
    </div>
  </div>

  <!-- Winner Banner -->
  <div class="winner-banner" id="winnerBanner">
    <div class="winner-title">🏆 Match Winner</div>
    <div class="winner-name" id="winnerName"></div>
  </div>

  <!-- Action Buttons -->
  <div class="buttons-row">
    <button class="btn-point btn-a" id="btnA" onclick="addPoint('A')">+ Point A</button>
    <button class="btn-point btn-b" id="btnB" onclick="addPoint('B')">+ Point B</button>
  </div>
  <button class="btn-undo" id="btnUndo" onclick="undo()" disabled>
    ↩ Undo Last Point
  </button>

  <!-- Rally History -->
  <div class="history-row" id="historyDots"></div>
  <div class="history-legend">
    <div class="legend-item"><div class="legend-dot a"></div> Player A</div>
    <div class="legend-item"><div class="legend-dot b"></div> Player B</div>
  </div>
</div>

<script>
  let scoreA = 0, scoreB = 0;
  let history = [];
  let rallyHistory = [];
  let currentServer = 'A';
  let gameOver = false;

  function addPoint(player) {
    if (gameOver) return;
    history.push({ scoreA, scoreB, currentServer, rally: [...rallyHistory] });
    if (player === 'A') scoreA++;
    else scoreB++;
    currentServer = player;
    rallyHistory.push(player);

    // Flash animation
    const block = player === 'A' ? 'blockA' : 'blockB';
    const el = document.getElementById(block);
    el.classList.remove('just-scored');
    void el.offsetWidth;
    el.classList.add('just-scored');

    checkWinner();
    updateDisplay();
  }

  function undo() {
    if (history.length === 0) return;
    const last = history.pop();
    scoreA = last.scoreA;
    scoreB = last.scoreB;
    currentServer = last.currentServer;
    rallyHistory = last.rally;
    gameOver = false;
    document.getElementById('winnerBanner').classList.remove('visible');
    updateDisplay();
  }

  function checkWinner() {
    if ((scoreA >= 21 || scoreB >= 21) && Math.abs(scoreA - scoreB) >= 2) gameOver = true;
    if (scoreA >= 30 || scoreB >= 30) gameOver = true;
  }

  function updateDisplay() {
    document.getElementById('scoreA').textContent = scoreA;
    document.getElementById('scoreB').textContent = scoreB;

    // Leading score highlight
    document.getElementById('blockA').classList.toggle('leading', scoreA > scoreB);
    document.getElementById('blockB').classList.toggle('leading', scoreB > scoreA);

    // Server info
    const serverScore = currentServer === 'A' ? scoreA : scoreB;
    const side = (serverScore % 2 === 0) ? 'Right' : 'Left';
    document.getElementById('serverInfo').innerHTML =
      `Server: <span>Player ${currentServer} (${side})</span>`;

    // Court sides
    const leftEl = document.getElementById('leftSide');
    const rightEl = document.getElementById('rightSide');
    leftEl.classList.toggle('active', side === 'Left');
    rightEl.classList.toggle('active', side === 'Right');

    // Shuttle position
    const shuttle = document.getElementById('courtShuttle');
    if (side === 'Right') {
      shuttle.style.right = '18%';
      shuttle.style.left = 'auto';
    } else {
      shuttle.style.left = '18%';
      shuttle.style.right = 'auto';
    }

    // Rally dots
    const dots = document.getElementById('historyDots');
    dots.innerHTML = rallyHistory.map(p =>
      `<div class="rally-dot ${p.toLowerCase()}"></div>`
    ).join('');

    // Undo button
    document.getElementById('btnUndo').disabled = history.length === 0;

    // Point buttons
    document.getElementById('btnA').disabled = gameOver;
    document.getElementById('btnB').disabled = gameOver;

    // Winner
    if (gameOver) {
      const banner = document.getElementById('winnerBanner');
      const name = scoreA > scoreB ? 'Player A Wins!' : 'Player B Wins!';
      document.getElementById('winnerName').textContent = name;
      banner.classList.add('visible');
    }
  }

  updateDisplay();
</script>
</body>
</html>
