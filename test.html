<!DOCTYPE html>
<html>
<body>

<h2>Share Image</h2>

<button onclick="sendImage()">Share</button>

<script>
function sendImage(){
  var canvas = document.createElement("canvas");
  canvas.width = 300;
  canvas.height = 150;

  var ctx = canvas.getContext("2d");

  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, 300, 150);

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Match Result 🏸", 40, 80);

  var dataUrl = canvas.toDataURL("image/png");

  fetch(dataUrl)
    .then(res => res.blob())
    .then(blob => {
      const file = new File([blob], "result.png", { type: "image/png" });

      if (navigator.share) {
        navigator.share({
          files: [file],
          title: "Match Result"
        });
      } else {
        alert("Sharing not supported in this WebView");
      }
    });
}
</script>

</body>
</html>
